name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `oc ...`
        2. ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, install method (pip, Docker), etc.
      placeholder: |
        - OS: Windows 11 / Ubuntu 24.04 / macOS 15
        - Python: 3.11.x
        - Install: pip / Docker (ghcr.io/openchronicle/core:latest)
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs or error output
      description: Paste any relevant logs or tracebacks.
      render: shell
    validations:
      required: false
