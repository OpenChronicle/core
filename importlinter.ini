[importlinter]
root_package = openchronicle

[contract:layered_architecture]
name = Layered architecture (domain -> application -> interfaces)
# Provide a simple initial layering guardrail; refine as modules stabilize.
layers = 
    domain
    application
    infrastructure
    interfaces

# Allow lower layers; forbid upward imports.
forbidden_dependencies =
    interfaces -> application
    interfaces -> domain
    interfaces -> infrastructure
    infrastructure -> interfaces
    application -> interfaces

[contract:no_infrastructure_in_domain]
name = Domain must not import infrastructure
source_modules = openchronicle.domain
forbidden_modules = openchronicle.infrastructure

