# Dev compose override — local source builds tagged :dev.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml build
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up serve
#
# See docs/runtime/docker_local_dev.md for the full workflow.

services:
  serve:
    image: openchronicle-mcp:dev

  openchronicle:
    image: openchronicle-mcp:dev

  discord:
    image: openchronicle-mcp:dev

  mcp:
    image: openchronicle-mcp:dev
