# 🛡️ OpenChronicle Pre-commit Hooks - Architecture Protection
# Automatically enforces hexagonal architecture compliance and code quality

repos:
  # 📁 FILE HYGIENE
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        name: "🧹 Remove trailing whitespace"
      - id: end-of-file-fixer
        name: "📄 Fix end of files"
      - id: check-yaml
        name: "📋 Validate YAML"
      - id: check-toml
        name: "⚙️ Validate TOML"
      - id: check-merge-conflict
        name: "🔀 Check merge conflicts"
      - id: check-added-large-files
        name: "📦 Check large files"
        args: ['--maxkb=500']
      - id: debug-statements
        name: "🐛 Check debug statements"

  # 🎨 CODE FORMATTING
  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
        name: "🎨 Code formatting (Black)"
        language_version: python3.12

  # 🔍 LINTING & QUALITY
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.9
    hooks:
      - id: ruff
        name: "🔍 Code quality (Ruff)"
        args: [--fix, --exit-non-zero-on-fix, --ignore=E501,F841,F401,E402,S603,S110]

  # 🏷️ TYPE CHECKING
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        name: "🏷️ Type checking (MyPy)"
        additional_dependencies: [pydantic>=2.0, types-pyyaml]
        args: [--config-file=pyproject.toml]
        exclude: ^(tests/|utilities/|scripts/|api/)

  # 🔒 SECURITY SCANNING
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.5
    hooks:
      - id: bandit
        name: "🔒 Security scan (Bandit)"
        args: [-r, ., --format=json, -o, bandit-report.json]
        exclude: tests/

  # Note: Safety tool has moved organizations and repositories
  # Using pip-audit as alternative for dependency security scanning
  # which is maintained by PyPA and more actively supported

  # 🏛️ ARCHITECTURE COMPLIANCE (Custom Enforcement)
  - repo: local
    hooks:
      # Temporarily disable problematic PowerShell hooks
      # - id: hexagonal-boundaries
      #   name: "🎯 ENFORCE: Hexagonal layer boundaries"
      #   entry: powershell.exe -ExecutionPolicy Bypass -File scripts/check-hexagonal-boundaries.ps1
      #   language: system
      #   pass_filenames: false

      # - id: import-structure-check
      #   name: "📁 VALIDATE: Import structure compliance"
      #   entry: powershell.exe -ExecutionPolicy Bypass -File scripts/check-import-structure.ps1
      #   language: system
      #   pass_filenames: false

      - id: pip-audit
        name: "🔍 Dependency audit (pip-audit)"
        entry: pip-audit
        language: system
        types: [python]
        require_serial: true
        pass_filenames: false

# Pre-commit.ci configuration
ci:
  autofix_commit_msg: "🔧 [pre-commit.ci] Auto-fix from hooks"
  autofix_prs: true
  autoupdate_commit_msg: "⬆️ [pre-commit.ci] pre-commit autoupdate"
  autoupdate_schedule: weekly
