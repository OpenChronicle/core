# Pre-commit configuration for OpenChronicle
# Enforces hexagonal architecture boundaries to prevent regression
#
# Install pre-commit: pip install pre-commit
# Install hooks: pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # Hexagonal Architecture Enforcement
  - repo: local
    hooks:
      - id: validate-architecture-boundaries
        name: Validate Hexagonal Architecture Boundaries
        entry: python scripts/architecture/validate_boundaries.py
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-commit, pre-push]
        verbose: true
        description: |
          Ensures core remains 100% storytelling-agnostic by validating:
          - Core modules don't import from plugins
          - Domain layer purity (no infrastructure dependencies)
          - Infrastructure only imports domain ports and utilities
          - Plugin isolation is maintained
      - id: forbid-guardrail-edits
        name: Forbid edits to guardrails (unless explicitly allowed)
        language: system
        entry: |
          bash -c '
            # allow override for maintainers CI or explicit intent
            if [ "$ALLOW_GUARDRAIL_EDIT" = "1" ]; then exit 0; fi
            # list changed files in index
            CHANGED=$(git diff --cached --name-only)
            BLOCKED=$(echo "$CHANGED" | grep -E \
              "^(tests/architecture/|tests/contracts/|\.github/workflows/|pytest\.ini|\.pre-commit-config\.yaml)")
            if [ -n "$BLOCKED" ]; then
              echo "Refusing to commit changes to guardrails:"
              echo "$BLOCKED"
              echo "Set ALLOW_GUARDRAIL_EDIT=1 if you really intend to edit them."
              exit 1
            fi
          '
        stages: [pre-commit]
      - id: copilot-naughty-list
        name: Copilot Naughty List (global)
        language: system
        entry: bash -lc 'python tools/copilot_naughty_list.py --paths . --exclude .git .venv venv .tox .mypy_cache __pycache__ dist build .pytest_cache --autofix --fail-on-findings'
        stages: [pre-commit]

  # Python Code Quality
  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
        name: Format Python code with Black
        args: [--line-length=120]

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        name: Sort imports with isort
        args: [--profile=black]

  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        name: Lint with flake8
        args: [--max-line-length=120, --extend-ignore=E203,W503]

  # Security and Safety
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.5
    hooks:
      - id: bandit
        name: Security linting with bandit
        args: [-r, src/, -x, tests/]

  # Documentation and Config
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
        name: Check YAML syntax
      - id: check-json
        name: Check JSON syntax
      - id: check-toml
        name: Check TOML syntax
      - id: check-merge-conflict
        name: Check for merge conflicts
      - id: trailing-whitespace
        name: Trim trailing whitespace
      - id: end-of-file-fixer
        name: Fix end of files
      - id: check-added-large-files
        name: Check for large files
        args: [--maxkb=1000]

# CI Configuration
ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit hooks

    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
  autoupdate_schedule: weekly
  skip: []
  submodules: false
