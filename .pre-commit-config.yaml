# Pre-commit configuration for OpenChronicle
# Enforces hexagonal architecture boundaries to prevent regression
#
# Install pre-commit: pip install pre-commit
# Install hooks: pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # Python Code Quality - Ruff (replaces black, isort, flake8)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        name: Lint with Ruff
        args: [--fix]
        types_or: [python, pyi]
        exclude: ^v1\.reference/
      - id: ruff-format
        name: Format with Ruff
        types_or: [python, pyi]
        exclude: ^v1\.reference/

  # Python Type Checking - Mypy
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.0
    hooks:
      - id: mypy
        name: Type check with Mypy
        args: [src, tests, plugins, --config-file=pyproject.toml]
        additional_dependencies: [pytest, "discord.py>=2.0", "fastapi>=0.110.0", "uvicorn[standard]>=0.27.0"]
        pass_filenames: false

  # Markdown Linting
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.18.0
    hooks:
      - id: markdownlint-cli2
        name: Lint Markdown with markdownlint-cli2
        args: [--fix]
        types: [markdown]
        exclude: ^(node_modules|\.venv|v1\.reference|\.pytest_cache)/

  # Secret Scanning - Gitleaks
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks
        name: Detect secrets with Gitleaks

  # General File Quality
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
        name: Check YAML syntax
        exclude: ^v1\.reference/
      - id: check-json
        name: Check JSON syntax
        exclude: ^v1\.reference/
      - id: check-toml
        name: Check TOML syntax
        exclude: ^v1\.reference/
      - id: check-merge-conflict
        name: Check for merge conflicts
      - id: trailing-whitespace
        name: Trim trailing whitespace
        exclude: ^v1\.reference/
      - id: end-of-file-fixer
        name: Fix end of files
        exclude: ^v1\.reference/
      - id: check-added-large-files
        name: Check for large files
        args: [--maxkb=1000]

  # Tests - Pytest (no integration)
  - repo: local
    hooks:
      - id: pytest-no-integration
        name: Pytest (no integration)
        entry: bash -c 'if [ -f .venv/Scripts/python.exe ]; then .venv/Scripts/python.exe -m pytest -m "not integration"; elif [ -f .venv/bin/python ]; then .venv/bin/python -m pytest -m "not integration"; else python -m pytest -m "not integration"; fi'
        language: system
        pass_filenames: false

# CI Configuration
ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit hooks

    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ""
  autoupdate_commit_msg: "[pre-commit.ci] pre-commit autoupdate"
  autoupdate_schedule: weekly
  skip: []
  submodules: false
