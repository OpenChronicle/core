[tool:pytest]
# Pytest configuration for OpenChronicle test suite
minversion = 6.0
addopts = 
    -ra 
    -q 
    --strict-markers 
    --strict-config
    --tb=short
    --maxfail=5
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    unit: Unit tests for individual orchestrators
    integration: Integration tests between orchestrators
    workflow: End-to-end workflow tests
    slow: Tests that take longer than 5 seconds
    requires_models: Tests requiring LLM model access
    session: Session-based tests requiring state management
    performance: Performance and benchmarking tests
    concurrency: Concurrency and thread-safety tests
    mock_only: Tests using only mock data (no external dependencies)
    performance: Performance and load testing
    stress: Stress testing under high load
    session: User session testing
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
timeout = 30
timeout_method = thread
