title: "Fantasy Tavern Start"
description: "A classic fantasy tavern setting perfect for beginning adventures"
author: "OpenChronicle Team"
version: "1.0.0"
created: "2025-01-15"

# Model Configuration
default_model: "ollama"
fallback_chain: ["ollama", "openai", "mock"]
content_analysis:
  enabled: true
  local_model: "llama3.2:1b"

# Content Settings
nsfw_flags: false
content_rating: "PG-13"
trigger_warnings: []

# Style Configuration
style_guide: "style_guide.md"
narrative_mode: "third-person"
tense: "present"
voice_style: "descriptive"

# Story Metadata
genre: ["fantasy", "adventure"]
themes: ["friendship", "discovery", "heroism"]
target_audience: "general"

# Technical Settings
max_scene_length: 2000
token_budget: 4000
memory_retention: 50  # Number of scenes to keep in active memory

# Story Structure
story_type: "open_world"
branching_enabled: true
choice_timeout: 300  # seconds

# Character Management
max_active_characters: 8
character_memory_depth: 10  # scenes

# Export Settings
export_formats: ["markdown", "json", "epub"]
include_metadata: true
include_scene_breaks: true
