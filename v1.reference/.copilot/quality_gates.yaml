# 🛡️ OpenChronicle Quality Gates Configuration
# Comprehensive automation for architecture protection and code quality

# 📊 QUALITY METRICS THRESHOLDS
quality_gates:

  # 🏛️ ARCHITECTURE COMPLIANCE
  architecture:
    legacy_imports_allowed: 0          # ❌ Zero tolerance for core.* imports
    hexagonal_violations_allowed: 0    # ❌ Domain layer must stay pure
    deep_relative_imports_threshold: 5  # ⚠️ Prefer absolute imports

  # 🧪 TESTING REQUIREMENTS
  testing:
    coverage_minimum: 85               # 🎯 85% code coverage required
    test_success_rate: 100             # ✅ All tests must pass
    performance_regression_threshold: 20  # 📈 Max 20% performance degradation

  # 🔒 SECURITY STANDARDS
  security:
    bandit_severity_block: ["HIGH"]    # 🚫 Block high severity issues
    safety_vulnerability_block: true   # 🛡️ Block known vulnerabilities
    dependency_audit_required: true    # 🔍 Regular dependency audits

  # 📏 CODE QUALITY
  code_quality:
    ruff_violations_allowed: 0         # 🔍 Clean code standards
    black_formatting_required: true   # 🎨 Consistent formatting
    mypy_type_coverage: 80             # 🏷️ Strategic type annotations

  # 📦 BUILD VALIDATION
  build:
    package_build_required: true      # 📦 Must build successfully
    twine_check_required: true        # ✅ Package validation

# 🚀 DEPLOYMENT GATES
deployment_gates:

  # 🔄 CONTINUOUS INTEGRATION
  ci_requirements:
    - architecture_compliance_check
    - comprehensive_test_suite
    - security_scan_clean
    - build_validation_passed

  # 🏷️ RELEASE READINESS
  release_requirements:
    - all_quality_gates_passed
    - documentation_updated
    - performance_benchmarks_stable
    - security_audit_clean

# 🎯 AUTOMATED ACTIONS
automation:

  # 🔧 AUTO-FIX ENABLED
  auto_fix:
    - code_formatting           # Black auto-format
    - import_sorting           # Ruff auto-fix
    - trailing_whitespace      # Pre-commit auto-fix

  # 🚫 BLOCK ON FAILURE
  blocking_failures:
    - legacy_imports_detected
    - hexagonal_violations
    - security_high_severity
    - test_failures
    - build_failures

  # ⚠️ WARNING ONLY
  warning_only:
    - deep_relative_imports
    - minor_code_quality_issues
    - documentation_gaps

# 📋 QUALITY CHECKLIST TEMPLATE
quality_checklist:
  architecture:
    - "✅ No legacy core.* imports"
    - "✅ Hexagonal boundaries respected"
    - "✅ Clean import structure"

  testing:
    - "✅ All tests passing"
    - "✅ Coverage ≥85%"
    - "✅ Performance stable"

  security:
    - "✅ No high severity issues"
    - "✅ Dependencies secure"
    - "✅ Security scan clean"

  code_quality:
    - "✅ Linting clean"
    - "✅ Formatting consistent"
    - "✅ Types strategically annotated"

  build:
    - "✅ Package builds successfully"
    - "✅ Package validation passes"
    - "✅ Documentation current"

# 🔄 MONITORING & METRICS
monitoring:

  # 📈 TREND TRACKING
  metrics_to_track:
    - architecture_compliance_percentage
    - test_coverage_percentage
    - code_quality_score
    - security_risk_level
    - build_success_rate

  # 🎯 SUCCESS INDICATORS
  success_indicators:
    - "Zero legacy imports maintained"
    - "Hexagonal architecture preserved"
    - "Test coverage improving/stable"
    - "Security vulnerabilities addressed"
    - "Code quality standards met"

# 🛡️ PROTECTION STRATEGY
protection_strategy:
  prevention:
    - "Pre-commit hooks block bad patterns"
    - "CI pipeline enforces quality gates"
    - "Automated testing catches regressions"

  detection:
    - "Architecture violations detected immediately"
    - "Security issues flagged in CI"
    - "Performance regressions identified"

  response:
    - "Automatic blocking of problematic changes"
    - "Clear feedback on quality issues"
    - "Guided remediation instructions"
