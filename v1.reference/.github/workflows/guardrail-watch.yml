# 🚫 DO NOT EDIT: guardrail test. Changes require CODEOWNERS approval.

name: Guardrail Watch
on: [pull_request]

jobs:
  guardrails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Detect guardrail edits
        run: |
          set -e
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          echo "$CHANGED" | grep -E '^(tests/architecture/|tests/contracts/|\.github/workflows/|pytest\.ini|\.pre-commit-config\.yaml)' \
            && echo "::error::Guardrail files changed. Add label 'allow-guardrail-edit' or split changes." && exit 1 || true
      - name: Allow override via label
        if: failure()
        uses: actions/github-script@v7
        id: haslabel
        with:
          script: |
            const label = 'allow-guardrail-edit';
            const pr_number = context.payload.pull_request.number;
            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr_number
            });
            const hasLabel = labels.some(l => l.name === label);
            core.setOutput('has_label', hasLabel);
      - name: Override
        if: failure() && steps.haslabel.outputs.has_label == 'true'
        run: echo "Override label present; continuing." && exit 0
