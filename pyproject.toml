[tool.pytest.ini_options]
# Pytest configuration for OpenChronicle
minversion = "6.0"
addopts = "-ra -q --strict-markers"
testpaths = [
    "tests",
]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks tests as integration tests",
    "unit: marks tests as unit tests",
    "asyncio: marks tests as asyncio tests",
    "session: marks tests as session-based tests requiring state management",
    "performance: marks tests as performance and benchmarking tests",
    "concurrency: marks tests as concurrency and thread-safety tests",
    "workflow: marks tests as end-to-end workflow tests",
    "requires_models: marks tests requiring LLM model access",
    "stress: marks tests as stress tests under high load",
]

# Asyncio configuration to suppress warnings
asyncio_mode = "strict"
asyncio_default_fixture_loop_scope = "function"

# Filter out common warnings that aren't actionable
filterwarnings = [
    "ignore::DeprecationWarning:transformers.*",
    "ignore::FutureWarning:transformers.*",
    "ignore::UserWarning:torch.*",
    "ignore::UserWarning:transformers.*",
]
