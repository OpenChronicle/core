version: "3.9"

services:
  openchronicle:
    build: .
    container_name: openchronicle
    volumes:
      - ./storypacks:/app/storypacks:ro
      - ./storage:/app/storage
      - ./config:/app/config
    ports:
      - "8199:8000"
    environment:
      - DEFAULT_STORY_PACK=demo-story
      # Uncomment next line for embedded Ollama deployment
      - OLLAMA_HOST=http://ollama:11434
      # Uncomment next line for external Ollama deployment
      # - OLLAMA_HOST=http://localhost:11434
    env_file:
      - .env
    restart: unless-stopped
    # Uncomment next 2 lines for embedded Ollama deployment
    depends_on:
      - ollama
    networks:
      - openchronicle

  # Embedded Ollama service - comment out entire section if using external LLM
  ollama:
    image: ollama/ollama:latest
    container_name: openchronicle-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    restart: unless-stopped
    networks:
      - openchronicle
    # Pull and run models for OpenChronicle
    command: >
      sh -c "
        ollama serve &
        sleep 10 &&
        ollama pull llama3.2:1b &&
        ollama pull llama3.2:3b &&
        wait
      "

volumes:
  # Comment out if not using embedded Ollama
  ollama_data:
    driver: local

networks:
  openchronicle:
    driver: bridge