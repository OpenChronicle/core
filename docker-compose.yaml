services:
  openchronicle:
    build:
      context: .
      dockerfile: Dockerfile
    image: openchronicle:latest
    container_name: openchronicle
    # Remove fixed user - let container handle user switching
    # user: "1026:100"
    volumes:
      - /volume1/docker/openchronicle:/app
    ports:
      - "8199:8000"
    environment:
      # Base app configuration
      DEFAULT_STORY_PACK: demo-story
      PYTHONPATH: /app/src

      # ===========================================
      # Model Configuration via Environment Variables
      # ===========================================
      # Primary Ollama instance (auto-discovered from global config)
      OLLAMA_HOST: http://ollama-alpha:11434
      # Backup Ollama instance (for future failover implementation)
      # OLLAMA_BACKUP_HOST: http://ollama-omega:11434

      # OpenAI Configuration
      # OPENAI_API_KEY: your_openai_key_here
      # OPENAI_BASE_URL: https://api.openai.com/v1  # Optional override

      # Anthropic Configuration
      # ANTHROPIC_API_KEY: your_anthropic_key_here
      # ANTHROPIC_BASE_URL: https://api.anthropic.com  # Optional override

      # Other API Keys (add as needed)
      # GROQ_API_KEY: your_groq_key_here
      # GOOGLE_API_KEY: your_gemini_key_here
      # COHERE_API_KEY: your_cohere_key_here
      # MISTRAL_API_KEY: your_mistral_key_here

      # System Configuration
      PUID: "1026"
      PGID: "100"
    restart: unless-stopped
    # Uncomment next 2 lines for embedded Ollama deployment
    # depends_on:
    #   - ollama
    networks:
      - ollama_openchronicle

  # Ollama service (uncomment to use embedded Ollama)
  # ollama:
  #   image: ollama/ollama
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   restart: unless-stopped
  #   networks:
  #     - ollama_openchronicle

networks:
  ollama_openchronicle:
    external: true

# Uncomment if using embedded Ollama
# volumes:
#   ollama_data:
