version: "3.9"

services:
  openchronicle:
    build: 
      context: .
      dockerfile: Dockerfile
    image: openchronicle:latest
    container_name: openchronicle
    user: "1026:100"
    volumes:
      - /volume1/docker/openchronicle:/app
    ports:
      - "8199:8000"
    environment:
      - DEFAULT_STORY_PACK=demo-story
      # Add your API keys here or set them in your system environment
      # - OPENAI_API_KEY=your_key_here
      # - ANTHROPIC_API_KEY=your_key_here
      # Ollama configuration - using ollama-alpha as primary
      - OLLAMA_HOST=http://ollama-alpha:11434
      # Backup Ollama instance (for future failover implementation)
      # - OLLAMA_BACKUP_HOST=http://ollama-omega:11434
    restart: unless-stopped
    # Uncomment next 2 lines for embedded Ollama deployment
    # depends_on:
    #   - ollama
    networks:
      - ollama_openchronicle

  # Ollama service (uncomment to use embedded Ollama)
  # ollama:
  #   image: ollama/ollama
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   restart: unless-stopped
  #   networks:
  #     - ollama_openchronicle

networks:
  ollama_openchronicle:
    external: true

# Uncomment if using embedded Ollama
# volumes:
#   ollama_data: