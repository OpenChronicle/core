version: "3.9"

services:
  openchronicle:
    build: .
    container_name: openchronicle
    volumes:
      - ./storypacks:/app/storypacks:ro
      - ./storage:/app/storage
    ports:
      - "8199:8000"
    environment:
      - DEFAULT_STORY_PACK=demo-story
    env_file:
      - .env
    restart: unless-stopped